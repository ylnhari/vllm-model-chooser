<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM Model Chooser - Find Your Perfect LLM</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --border: #2a2a3a;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-2px);
        }
        .filter-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }
        .filter-btn:hover { border-color: var(--accent); }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-bf16 { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .badge-fp8 { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-int4 { background: rgba(249, 115, 22, 0.2); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.3); }
        .badge-nvfp4 { background: rgba(236, 72, 153, 0.2); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
        .badge-mxfp4 { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }
        .badge-mxfp8 { background: rgba(20, 184, 166, 0.2); color: #2dd4bf; border: 1px solid rgba(20, 184, 166, 0.3); }
        .badge-int8 { background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .gpu-bar {
            height: 8px;
            border-radius: 4px;
            background: var(--bg-secondary);
            overflow: hidden;
        }
        .gpu-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .verdict-yes { background: var(--success); }
        .verdict-warning { background: var(--warning); }
        .verdict-no { background: var(--danger); }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .benchmark-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }
        .benchmark-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
        }
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }
        .stats-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
        }
    </style>
</head>
<body class="scrollbar-thin">
    <div class="min-h-screen">
        <!-- Navigation -->
        <nav class="border-b border-[#2a2a3a] bg-[#0a0a0f]/80 backdrop-blur-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold"><span class="gradient-text">vLLM Model Chooser</span></h1>
                    <p class="text-sm text-[#8888a0]">Find your perfect LLM for any GPU setup</p>
                </div>
                <button onclick="openGPUInfoModal()" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/></svg>
                    GPU & Format Info
                </button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-6 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stats-card rounded-xl p-4 border border-[#2a2a3a]">
                    <div class="text-sm text-[#8888a0]">Total Models</div>
                    <div class="text-3xl font-bold mt-1" id="totalModels">0</div>
                </div>
                <div class="stats-card rounded-xl p-4 border border-[#2a2a3a]">
                    <div class="text-sm text-[#8888a0]">Fit Selected GPU</div>
                    <div class="text-3xl font-bold mt-1 text-[#22c55e]" id="fitModels">0</div>
                </div>
                <div class="stats-card rounded-xl p-4 border border-[#2a2a3a]">
                    <div class="text-sm text-[#8888a0]">Quant Variants</div>
                    <div class="text-3xl font-bold mt-1 text-[#f59e0b]" id="quantModels">0</div>
                </div>
                <div class="stats-card rounded-xl p-4 border border-[#2a2a3a]">
                    <div class="text-sm text-[#8888a0]">Don't Fit</div>
                    <div class="text-3xl font-bold mt-1 text-[#ef4444]" id="noFitModels">0</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="flex flex-wrap gap-4 mb-6 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-sm text-[#8888a0] font-medium">GPUs:</span>
                    <div class="flex gap-1" id="gpuCountFilter">
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="0" onclick="setGPUFilter(0)">Any</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm active" data-value="1" onclick="setGPUFilter(1)">1</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="2" onclick="setGPUFilter(2)">2</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="3" onclick="setGPUFilter(3)">3</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="4" onclick="setGPUFilter(4)">4</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="5" onclick="setGPUFilter(5)">5</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="6" onclick="setGPUFilter(6)">6</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="7" onclick="setGPUFilter(7)">7</button>
                        <button class="filter-btn px-3 py-1.5 rounded-lg text-sm" data-value="8" onclick="setGPUFilter(8)">8</button>
                    </div>
                </div>
                <div>
                    <select id="gpuTypeSelect" onchange="setGPUFilter(currentGPUFilter)" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white">
                        <option value="L4-24GB">L4 24GB</option>
                        <option value="A100-80GB">A100 80GB</option>
                        <option value="H100-80GB">H100 80GB</option>
                        <option value="H200-141GB">H200 141GB</option>
                        <option value="B100-192GB">B100 192GB</option>
                        <option value="B200-192GB">B200 192GB</option>
                    </select>
                </div>
                <div>
                    <select id="quantFilter" onchange="filterModels()" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white">
                        <option value="all">All Precision</option>
                        <option value="BF16">BF16</option>
                        <option value="FP8">FP8</option>
                        <option value="INT8">INT8 / W8A8</option>
                        <option value="INT4">INT4 / AWQ / GPTQ</option>
                        <option value="NVFP4">NVFP4</option>
                        <option value="MXFP4">MXFP4</option>
                        <option value="MXFP8">MXFP8</option>
                    </select>
                </div>
                <div>
                    <select id="typeFilter" onchange="filterModels()" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white">
                        <option value="all">All Types</option>
                        <option value="text">Text</option>
                        <option value="vision">Vision</option>
                        <option value="moe">MoE</option>
                        <option value="embedding">Embedding</option>
                    </select>
                </div>
                <div>
                    <select id="contextFilter" onchange="filterModels()" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white">
                        <option value="0">Any Context</option>
                        <option value="8192">8K+</option>
                        <option value="32768">32K+</option>
                        <option value="131072">128K+</option>
                        <option value="1048576">1M+</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-sm text-[#8888a0] font-medium" title="Adds an estimated FP16 KV-cache footprint to the weight VRAM when checking fit. Computed from each model's attention geometry (layers × KV-heads × head-dim) where available; a coarse params×tokens proxy for models whose geometry couldn't be fetched.">KV est:</span>
                    <select id="kvContextSelect" onchange="filterModels()" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white">
                        <option value="0">Off</option>
                        <option value="8192">8K ctx</option>
                        <option value="32768">32K ctx</option>
                        <option value="131072">128K ctx</option>
                        <option value="1048576">1M ctx</option>
                    </select>
                </div>
                <button onclick="resetFilters()" class="filter-btn px-3 py-1.5 rounded-lg text-sm" title="Reset all filters to defaults">Reset</button>
                <span id="resultCount" class="text-sm text-[#8888a0]"></span>
                <div class="ml-auto flex gap-2">
                    <input id="searchInput" oninput="filterModels()" type="text" placeholder="Search models..." class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white w-48">
                    <select id="sortSelect" onchange="filterModels()" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-[#12121a] border border-[#2a2a3a] text-white">
                        <option value="params" selected>Parameters</option>
                        <option value="default">Default</option>
                        <option value="vram">VRAM</option>
                        <option value="contextLength">Context Length</option>
                        <option value="name">Name</option>
                        <option value="mmlu">MMLU Score</option>
                        <option value="humaneval">HumanEval Score</option>
                    </select>
                </div>
            </div>

            <!-- Models Grid -->
            <div id="modelsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            
            <!-- No Results -->
            <div id="noResults" class="hidden text-center py-20">
                <div class="text-4xl mb-4">🔍</div>
                <h3 class="text-xl font-semibold mb-2">No Models Found</h3>
                <p class="text-[#8888a0]">Try adjusting your filters or search query</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modelModal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
        <div class="bg-[#1a1a24] border border-[#2a2a3a] rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto scrollbar-thin">
            <div class="sticky top-0 bg-[#1a1a24] border-b border-[#2a2a3a] px-6 py-4 flex items-center justify-between">
                <div>
                    <h2 id="modalTitle" class="text-xl font-bold"></h2>
                    <p id="modalProvider" class="text-sm text-[#8888a0]"></p>
                </div>
                <button onclick="closeModal()" class="text-[#8888a0] hover:text-white text-2xl">&times;</button>
            </div>
            <div id="modalContent" class="p-6"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
